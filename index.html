<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sealchat - Private Connection</title>
    <link rel="manifest" href="manifest.json">
    
    <!-- This line tells iOS devices that we have a custom icon -->
    <link rel="apple-touch-icon" href="sealchat-icon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0B0F19; /* Ultra dark background */
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-rendering: optimizeLegibility;
        }

        .container {
            text-align: center;
            max-width: 80%;
        }

        .app-logo {
            width: 120px; /* Perfect size for mobile splash */
            height: 120px;
            margin-bottom: 25px;
            
            /* Add that soft golden glow effect from your logo back into the app UI */
            filter: drop-shadow(0px 0px 20px rgba(255, 215, 0, 0.4));
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
            font-weight: 800;
        }

        p {
            color: #8A99AD; /* Softer, dark grey text */
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 300px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- New Logo Implemented -->
        <img src="sealchat-icon.png" alt="Sealchat Logo" class="app-logo">
        
        <h1>Sealchat</h1>
        <p>Pure connection.<br>Zero distractions.</p>
    </div>
</body>
</html>
