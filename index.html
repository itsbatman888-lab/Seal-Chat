<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sealchat - Private Connection</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="sealchat-icon.png">

    <!-- Load the official Supabase library from a free CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0B0F19;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0px 0px 20px rgba(255, 215, 0, 0.4));
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
        }

        p {
            color: #8A99AD;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Premium Minimalist Button Layout */
        .btn {
            background-color: #FFFFFF;
            color: #0B0F19;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Chat Layout (Hidden by default until logged in) */
        #chat-interface {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background-color: #0B0F19;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #1E293B;
            text-align: left;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-interface" class="container">
        <img src="sealchat-icon.png" alt="Sealchat Logo" class="app-logo">
        <h1>Sealchat</h1>
        <p>Pure connection.<br>Zero distractions.</p>
        <button class="btn" onclick="loginWithGoogle()">Sign in with Google</button>
    </div>

    <!-- 2. MAIN CHAT SCREEN -->
    <div id="chat-interface">
        <div class="chat-header">
            🦭 Sealchat Dashboard
        </div>
        <div style="padding: 20px; color: #8A99AD;">
            Securely logged in! E2EE cryptographic keys generated locally. Welcome to the anti-distraction movement.
        </div>
    </div>

    <script>
        // ==========================================
        // 🛑 PASTE YOUR SUPABASE CREDENTIALS HERE 👇
        // ==========================================
        const SUPABASE_URL = "https://pfiwaitnprowlzoyyzjh.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "sb_publishable_OjIu1xu2707E9Sosf0HTNg_LHjS9S6y";
        
        // Initialize the Supabase Client connection
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Google Authentication Logic
        async function loginWithGoogle() {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://itsbatman888-lab.github.io/Seal-Chat/' // Automatically brings them back to your site
                }
            });
            if (error) console.error("Login failed:", error.message);
        }

        // Check if the user is already signed in on page load
        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Hide login, show secure chat interface
                document.getElementById('login-interface').style.display = 'none';
                document.getElementById('chat-interface').style.display = 'flex';
                
                // Trigger local encryption key generation safely on device
                await handleEncryptionKeys(session.user);
            }
        }

        // Native E2EE Engine using Web Crypto API
        async function handleEncryptionKeys(user) {
            // Check if key pair already exists locally
            if (!localStorage.getItem('sealchat_private_key')) {
                console.log("Generating fresh E2EE cryptographic keys on device...");
                
                // Generate secure asymmetric 2048-bit keypair
                const keyPair = await window.crypto.subtle.generateKey(
                    {
                        name: "RSA-OAEP",
                        modulusLength: 2048,
                        publicExponent: new Uint8Array([1, 0, 1]),
                        hash: "SHA-256",
                    },
                    true,
                    ["encrypt", "decrypt"]
                );

                // Export and save keys
                const exportedPublicKey = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
                const publicKeyBase64 = btoa(String.fromCharCode(...new Uint8Array(exportedPublicKey)));
                
                const exportedPrivateKey = await window.crypto.subtle.exportKey("pkcs8", keyPair.privateKey);
                const privateKeyBase64 = btoa(String.fromCharCode(...new Uint8Array(exportedPrivateKey)));

                // Private key stays locked in local device browser sandbox forever
                localStorage.setItem('sealchat_private_key', privateKeyBase64);

                // Send public lock key to Supabase profiles database table
                await supabase.from('profiles').upsert({
                    id: user.id,
                    email: user.email,
                    public_key: publicKeyBase64
                });
            }
        }

        // Run check on startup
        checkUser();
    </script>
</body>
</html>
